# pubspec.yaml
name: vpnapp
description: A Flutter WireGuard VPN application for Android.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  wireguard_flutter: ^0.1.3      # ← was ^1.0.4 (doesn't exist)
  file_picker: ^8.0.3
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  http: ^1.2.0
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true